# Serves the Curbside SPA. Any path that isn't a real file falls back to
# index.html so client-side routes (/login, /items/:id, ...) work on refresh.
# Listens on 5173 to match the port the compose files already map.
server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
