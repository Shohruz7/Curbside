# Render Blueprint for the Curbside API.
# Render builds the Docker image from this repo on its own amd64 machines (no
# Docker Hub push needed), injects PORT, and puts HTTPS in front automatically.
#
# Set up: Render Dashboard > New > Blueprint > point at this repo. Then fill in
# the `sync: false` env vars (secrets) in the dashboard. Pushing to the repo
# triggers a rebuild and deploy.
#
# NOTE: the free instance type spins down after ~15 min idle and cold-starts on
# the next request (~30s). While asleep, the reservation-release background job
# is paused; it resumes on the next request. Use a paid instance to keep it
# always-on.

services:
  - type: web
    name: curbside-api
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    # Build context is the repo root so `COPY shared /shared` in the Dockerfile
    # can see the shared/ package.
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false # set in dashboard: mongodb+srv://...@cluster.mongodb.net/curbside
      - key: JWT_SECRET
        sync: false # set in dashboard: openssl rand -hex 32
      # Public (not a secret) — allowed frontend origins. Add the Vercel
      # *.vercel.app preview URL too if you test before the custom domain's DNS
      # is live.
      - key: CORS_ORIGIN
        value: https://curbside.com,https://www.curbside.com,https://curbside-tau.vercel.app
      - key: NODE_ENV
        value: production
      - key: NOMINATIM_USER_AGENT
        value: curbside-app/1.0 (contact shohruzabd19@gmail.com)
